def now_str():
    return datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')


def send_tg(msg):
    if not TG_TOKEN or not TG_CHAT_ID:
        print("⚠️ TG未配置，跳过推送")
        return
    url = f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage"
    data = urllib.parse.urlencode({
        "chat_id": TG_CHAT_ID,
        "text": msg,
        "parse_mode": "HTML",
    }).encode()
    try:
        req = urllib.request.Request(url, data=data, method="POST")
        with urllib.request.urlopen(req, timeout=15):
            print("📨 TG推送成功")
    except Exception as e:
        print(f"⚠️ TG推送失败：{e}")


def tg_notify(server_id, server_name, result, detail=""):
    msg = (
        f"🎮 <b>FreeMCServer 续期通知</b>\n"
        f"🕐 时间: {now_str()}\n"
        f"🖥 服务器: {server_name} (#{server_id})\n"
        f"📊 结果: {result}"
    )
    if detail:
        msg += f"\n📝 详情: {detail}"
    send_tg(msg)


def inject_ad_hunter(sb):
    """注入广告猎手（常驻）"""
    try:
        sb.execute_script(AD_HUNTER_JS)
        print("🛡️ 广告猎手已注入（常驻监听）")
    except Exception as e:
        print(f"⚠️ 广告猎手注入失败：{e}")


