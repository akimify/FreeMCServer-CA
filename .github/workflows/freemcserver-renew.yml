# 核心：续期单个服务器
# ============================================================

def renew_server(sb, server_id, server_name):
    """
    进入 /server/{id}，自动判断场景A（已过期）或场景B（运行中），执行续期。
    返回 (success: bool, detail: str)
    """
    server_url = f"https://panel.freemcserver.net/server/{server_id}"
    print(f"\n{'='*50}")
    print(f"🖥  处理服务器：{server_name} (#{server_id})")
    print(f"{'='*50}")

    sb.open(server_url)
    time.sleep(3)
    inject_ad_hunter(sb)

    page_title = sb.get_title()
    print(f"📄 页面标题：{page_title}")

    # ── 场景A：服务器已过期 ─────────────────────────────────
    if "expired" in page_title.lower() or "expired" in sb.get_page_source().lower():
        print("⚠️ 场景A：服务器已过期，走过期续期流程")
        # 点击 Renew Server 按钮
        try:
            sb.wait_for_element_visible("a.btn.btn-success.btn-lg", timeout=10)
            sb.click("a.btn.btn-success.btn-lg")
        except Exception:
            return False, "过期页面未找到Renew按钮"
        time.sleep(2)
        inject_ad_hunter(sb)
    else:
        # ── 场景B：服务器运行中，点击 Renew Tab ────────────
        print("✅ 场景B：服务器运行中，点击Renew标签页")
        try:
            sb.wait_for_element_visible("a.server-tab[href*='/renew']", timeout=10)
            sb.click("a.server-tab[href*='/renew']")
        except Exception:
            # 备用：直接导航
            sb.open(f"{server_url}/renew")
        time.sleep(2)
        inject_ad_hunter(sb)

    # ── 进入 /renew 页，选择 Normal Renewal ─────────────────
    print("🔍 寻找 Choose Normal Renewal 按钮...")
    try:
        sb.wait_for_element_visible("a.btn.btn-lg.btn-success", timeout=15)
        # 找包含 Normal 的那个
        sb.execute_script("""
            var links = Array.from(document.querySelectorAll('a.btn.btn-lg.btn-success'));
            var btn = links.find(function(a){ return a.innerText.includes('Normal'); });
            if (btn) btn.click();
        """)
    except Exception:
        return False, "未找到Normal Renewal按钮"

    time.sleep(3)
    inject_ad_hunter(sb)

    # ── 进入 /renew-basic，处理 Turnstile ───────────────────
    current_url = sb.get_current_url()
    print(f"📄 当前页面：{current_url}")
    if "renew-basic" not in current_url:
        return False, f"未进入renew-basic页（当前：{current_url}）"

    print("⏳ 等待Turnstile组件加载...")
    for _ in range(15):
        if turnstile_exists(sb):
            print("✅ Turnstile组件就绪")
            break
        time.sleep(1)
    else:
        print("⚠️ 未检测到Turnstile，直接提交")

    if turnstile_exists(sb):
        if not solve_turnstile(sb, tag=str(server_id)):
            return False, "Turnstile验证失败"

    # ── 点击 Renew Server Now ────────────────────────────────
    print("📤 点击 Renew Server Now...")
    try:
        sb.wait_for_element_visible("#renew-btn", timeout=10)
        sb.click("#renew-btn")
    except Exception:
        # 备用：JS提交表单
        sb.execute_script("document.querySelector('form#w0').submit();")

    time.sleep(5)
    inject_ad_hunter(sb)

    # ── 检测成功弹窗 ──────────────────────────────────────────
    success_text = sb.execute_script("""
        (function(){
            var el = document.getElementById('swal2-html-container');
            return el ? el.innerText.trim() : '';
        })()
    """) or ""

    if "renewed" in success_text.lower():
        # 点击 OK 关闭弹窗
        try:
            sb.click("button.swal2-confirm")
            time.sleep(1)
        except Exception:
            pass

        # 读取倒计时
        countdown = sb.execute_script("""
            (function(){
                var el = document.querySelector('div.countdown-label');
                return el ? el.innerText.trim() : '';
            })()
        """) or ""
        detail = f"倒计时：{countdown}" if countdown else "续期成功"
        print(f"🎉 续期成功！{detail}")
        sb.save_screenshot(f"renew_success_{server_id}.png")
        return True, detail
    else:
        # 检查是否已跳转回服务器页（也算成功）
        if sb.get_current_url().endswith(f"/server/{server_id}"):
            # 再次检查页面有无成功提示
            page_src = sb.get_page_source()
            if "renewed" in page_src.lower():
                return True, "续期成功（页面已更新）"
        print(f"⚠️ 未检测到成功弹窗，弹窗内容：{success_text!r}")
        sb.save_screenshot(f"renew_unknown_{server_id}.png")
        return False, f"未收到成功确认（弹窗：{success_text or '无'}）"


# ============================================================
# 主流程
# ============================================================

def run():
    print("🚀 FreeMCServer 自动续期脚本启动")
    print(f"🕐 {now_str()}")

    with SB(uc=True, test=True, headless2=False) as sb:
        print("🌐 浏览器就绪，注入广告猎手...")
        inject_ad_hunter(sb)

        # ── 登录 ──────────────────────────────────────────────
        print(f"\n🔑 打开登录页：{LOGIN_URL}")
        sb.uc_open_with_reconnect(LOGIN_URL, reconnect_time=4)
        time.sleep(2)
        inject_ad_hunter(sb)

        try:
            sb.wait_for_element_visible("#loginformmodel-username", timeout=20)
            sb.type("#loginformmodel-username", USERNAME)
            sb.type("#loginformmodel-password", PASSWORD)
        except Exception:
            print("❌ 登录框加载失败")
            sb.save_screenshot("login_fail.png")
            send_tg("❌ FreeMCServer：登录框加载失败")
            return

        try:
            sb.click("button.btn.btn-register")
        except Exception:
            print("❌ 登录按钮点击失败")
            sb.save_screenshot("login_btn_fail.png")
            send_tg("❌ FreeMCServer：登录按钮点击失败")
            return

        # 等待跳转到服务器列表
        print("⏳ 等待登录跳转...")
        for _ in range(40):
            if "server/index" in sb.get_current_url() or sb.get_current_url() == SERVER_INDEX_URL:
                print("✅ 登录成功！")
                break
            time.sleep(0.5)
        else:
            print("❌ 登录超时")
            sb.save_screenshot("login_timeout.png")
            send_tg("❌ FreeMCServer：登录超时")
            return

        time.sleep(2)
        inject_ad_hunter(sb)

        # ── 自动发现所有服务器 ────────────────────────────────
        print("\n🔍 扫描服务器列表...")
        servers = sb.execute_script("""
            (function(){
                var result = [];
                var links = Array.from(document.querySelectorAll('a[href*="/server/"]'));
                links.forEach(function(a) {
                    var m = a.href.match(/\/server\/(\d+)$/);
                    if (!m) return;
                    var id = m[1];
                    // 找最近的服务器名称
                    var card = a.closest('.card, .server-card, tr, .list-group-item') || a.parentElement;
                    var name = '';
                    if (card) {
                        var nameEl = card.querySelector('h5, h4, h3, .server-name, strong, b');
                        if (nameEl) name = nameEl.innerText.trim();
                    }
                    if (!name) name = 'Server-' + id;
                    // 去重
                    if (!result.find(function(s){ return s.id === id; })) {
                        result.push({ id: id, name: name });
                    }
                });
                return result;
            })()
        """) or []

        if not servers:
            print("❌ 未找到任何服务器")
            sb.save_screenshot("no_servers.png")
            send_tg("❌ FreeMCServer：服务器列表为空")
            return

        print(f"✅ 发现 {len(servers)} 台服务器：")
        for s in servers:
            print(f"  • {s['name']} (#{s['id']})")

        # ── 逐台续期 ──────────────────────────────────────────
        results = []
        for s in servers:
            try:
                success, detail = renew_server(sb, s['id'], s['name'])
                results.append((s['id'], s['name'], success, detail))
                tg_notify(
                    s['id'], s['name'],
                    "✅ 续期成功" if success else "❌ 续期失败",
                    detail
                )
            except Exception as e:
                print(f"❌ 处理服务器 {s['name']} 时异常：{e}")
                results.append((s['id'], s['name'], False, str(e)))
                tg_notify(s['id'], s['name'], "❌ 脚本异常", str(e))
            time.sleep(2)

        # ── 汇总日志 ──────────────────────────────────────────
        print(f"\n{'='*50}")
        print("📊 续期汇总：")
        for sid, sname, ok, detail in results:
            icon = "✅" if ok else "❌"
            print(f"  {icon} {sname} (#{sid}) — {detail}")
        print(f"{'='*50}\n")


if __name__ == "__main__":
    run()
