# ============================================================
# 广告猎手（常驻 MutationObserver）
# ============================================================
AD_HUNTER_JS = """
(function() {
    if (window.__ad_hunter_injected__) return;
    window.__ad_hunter_injected__ = true;

    var AD_SELECTORS = [
        'iframe[src*="googlesyndication"]',
        'iframe[src*="doubleclick"]',
        'iframe[src*="adnxs"]',
        'iframe[src*="openx"]',
        'iframe[id*="google_ads"]',
        'div[id*="google_ads"]',
        'iframe[id="google_ads_top_frame"]',
        'iframe[id="goog_plcm_frame"]',
        '#google_ads_top_frame',
        '.adsbygoogle',
        '[data-ad-slot]',
        '[data-adunit]',
    ];

    var AD_SCRIPT_PATTERNS = [
        'googlesyndication',
        'doubleclick',
        'adnxs',
        'openx',
        'googletag',
        'uidapi',
        'googletagmanager',
        'securepubads',
    ];

    function removeAdElement(el) {
        try {
            if (el && el.parentNode) {
                el.parentNode.removeChild(el);
            }
        } catch(e) {}
    }

    function killAds(root) {
        root = root || document;
        AD_SELECTORS.forEach(function(sel) {
            try {
                root.querySelectorAll(sel).forEach(removeAdElement);
            } catch(e) {}
        });
        // 广告脚本
        try {
            root.querySelectorAll('script[src]').forEach(function(s) {
                var src = s.src || '';
                if (AD_SCRIPT_PATTERNS.some(function(p){ return src.includes(p); })) {
                    removeAdElement(s);
                }
            });
        } catch(e) {}
        // 内联广告脚本（googletag）
        try {
            root.querySelectorAll('script:not([src])').forEach(function(s) {
                var txt = s.textContent || '';
                if (txt.includes('googletag') || txt.includes('googlesyndication')) {
                    removeAdElement(s);
                }
            });
        } catch(e) {}
    }

    // 立即执行一次
    killAds(document);

    // MutationObserver 常驻监听
    var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
            m.addedNodes.forEach(function(node) {
                if (node.nodeType !== 1) return;
                // 检查自身
                var tag = (node.tagName || '').toLowerCase();
                var id = (node.id || '');
                var src = (node.src || '');
                var isAd = (
                    AD_SELECTORS.some(function(sel) {
                        try { return node.matches(sel); } catch(e) { return false; }
                    }) ||
                    (tag === 'script' && AD_SCRIPT_PATTERNS.some(function(p){ return src.includes(p); })) ||
                    (tag === 'script' && !src && ((node.textContent||'').includes('googletag')))
                );
                if (isAd) {
                    removeAdElement(node);
                    return;
                }
                // 检查子树
                if (node.querySelectorAll) {
                    killAds(node);
                }
            });
        });
    });

    observer.observe(document.documentElement, {
        childList: true,
        subtree: true
    });

    console.log('[AdHunter] 广告猎手已常驻，持续拦截中...');
})();
"""

# ============================================================
# CF Turnstile 相关 JS
# ============================================================
EXPAND_POPUP_JS = """
(function() {
    var turnstileInput = document.querySelector('input[name="cf-turnstile-response"]');
    if (!turnstileInput) return;
    var el = turnstileInput;
    for (var i = 0; i < 20; i++) {
        el = el.parentElement;
        if (!el) break;
        var style = window.getComputedStyle(el);
        if (style.overflow === 'hidden' || style.overflowX === 'hidden' || style.overflowY === 'hidden') {
            el.style.overflow = 'visible';
        }
        el.style.minWidth = 'max-content';
    }
})();
"""

INJECT_TOKEN_LISTENER_JS = """
(function() {
    if (window.__cf_token_listener_injected__) return;
    window.__cf_token_listener_injected__ = true;
    window.__cf_turnstile_token__ = '';

    window.addEventListener('message', function(e) {
        try {
            var d = e.data;
            if (!d || typeof d !== 'object') return;
            if (d.event === 'food') return;
            var token = d.token || d.response;
            if (token && token.length > 20) {
                window.__cf_turnstile_token__ = token;
                var inputs = document.querySelectorAll(
                    'input[name="cf-turnstile-response"], input[id*="cf-chl-widget"]'
                );
                for (var i = 0; i < inputs.length; i++) {
                    try {
                        var nativeSet = Object.getOwnPropertyDescriptor(
                            HTMLInputElement.prototype, 'value'
                        ).set;
                        nativeSet.call(inputs[i], token);
                        inputs[i].dispatchEvent(new Event('input',  {bubbles: true}));
                        inputs[i].dispatchEvent(new Event('change', {bubbles: true}));
                    } catch(err) {
                        inputs[i].value = token;
                    }
                }
            }
        } catch(err) {}
    });
})();
"""

READ_CAPTURED_TOKEN_JS = """
(function(){
    return window.__cf_turnstile_token__ || '';
})()
"""

