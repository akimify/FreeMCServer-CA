def xdotool_click(x, y):
    x, y = int(x), int(y)
    try:
        result = subprocess.run(
            ["xdotool", "search", "--onlyvisible", "--class", "chrome"],
            capture_output=True, text=True, timeout=3
        )
        wids = [w for w in result.stdout.strip().split('\n') if w]
        if wids:
            subprocess.run(["xdotool", "windowactivate", wids[-1]],
                           timeout=2, stderr=subprocess.DEVNULL)
            time.sleep(0.2)
        subprocess.run(["xdotool", "mousemove", str(x), str(y)], timeout=2, check=True)
        time.sleep(0.15)
        subprocess.run(["xdotool", "click", "1"], timeout=2, check=True)
        print(f"📐 xdotool 坐标点击成功 ({x}, {y})")
        return True
    except Exception as e:
        print(f"⚠️ xdotool点击失败：{e}")
        return False


def get_window_offset(sb):
    try:
        result = subprocess.run(
            ["xdotool", "search", "--onlyvisible", "--class", "chrome"],
            capture_output=True, text=True, timeout=3
        )
        wids = [w for w in result.stdout.strip().split('\n') if w]
        if wids:
            geo = subprocess.run(
                ["xdotool", "getwindowgeometry", "--shell", wids[-1]],
                capture_output=True, text=True, timeout=3
            ).stdout
            geo_dict = {}
            for line in geo.strip().split('\n'):
                if '=' in line:
                    k, v = line.split('=', 1)
                    geo_dict[k.strip()] = int(v.strip())
            win_x = geo_dict.get('X', 0)
            win_y = geo_dict.get('Y', 0)
            info = sb.execute_script(
                "(function(){ return { outer: window.outerHeight, inner: window.innerHeight }; })()"
            )
            toolbar = info['outer'] - info['inner']
            if not (30 <= toolbar <= 200):
                toolbar = 87
            return win_x, win_y, toolbar
    except Exception:
        pass
    try:
        info = sb.execute_script("""
            (function(){
                return {
                    screenX: window.screenX || 0,
                    screenY: window.screenY || 0,
                    outer: window.outerHeight,
                    inner: window.innerHeight
                };
            })()
        """)
        toolbar = info['outer'] - info['inner']
        if not (30 <= toolbar <= 200):
            toolbar = 87
        return info['screenX'], info['screenY'], toolbar
    except Exception:
        return 0, 0, 87


def get_turnstile_coords(sb):
    """动态计算 Turnstile 红点坐标（视口坐标）"""
    return sb.execute_script("""
        (function(){
            // 优先：通过 cf-chl-widget 的 hidden input 锚点
            var anchors = document.querySelectorAll('input[id*="cf-chl-widget"]');
            for (var i = 0; i < anchors.length; i++) {
                var anchor = anchors[i];
                var parent = anchor.parentElement;
                if (parent) {
                    var rect = parent.getBoundingClientRect();
                    if (rect.width > 0 && rect.height > 0) {
                        return {
                            click_x: Math.round(rect.left + rect.width / 2 - 130),
                            click_y: Math.round(rect.top  + rect.height / 2)
                        };
                    }
                }
            }
            // 备选：cf-turnstile-response
            var input = document.querySelector('input[name="cf-turnstile-response"]');
            if (input && input.parentElement) {
                var rect = input.parentElement.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) {
                    return {
                        click_x: Math.round(rect.left + rect.width / 2 - 130),
                        click_y: Math.round(rect.top  + rect.height / 2)
                    };
                }
            }
            // 备选：.cf-turnstile 容器
            var container = document.querySelector('.cf-turnstile');
            if (container) {
                var rect = container.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) {
                    return {
                        click_x: Math.round(rect.left + 30),
                        click_y: Math.round(rect.top  + rect.height / 2)
                    };
                }
            }
            return null;
        })()
    """)


def check_token(sb):
    try:
        ok = sb.execute_script("""
            (function(){
                var inputs = document.querySelectorAll(
                    'input[name="cf-turnstile-response"], input[id*="cf-chl-widget"]'
                );
                for (var i = 0; i < inputs.length; i++) {
                    if (inputs[i].value && inputs[i].value.length > 20) return true;
                }
                return false;
            })()
        """)
        if ok:
            return True
    except Exception:
        pass
    try:
        token = sb.execute_script(READ_CAPTURED_TOKEN_JS)
        if token and len(token) > 20:
            return True
    except Exception:
        pass
    return False


def turnstile_exists(sb):
    try:
        return sb.execute_script("""
            (function(){
                return !!(
                    document.querySelector('input[name="cf-turnstile-response"]') ||
                    document.querySelector('input[id*="cf-chl-widget"]') ||
                    document.querySelector('.cf-turnstile')
                );
            })()
        """)
    except Exception:
        return False


def solve_turnstile(sb, tag="") -> bool:
    """完整 Turnstile 处理流程：展开 → 注入监听 → 等待自动 → 否则 xdotool 点击"""
    label = f"[{tag}] " if tag else ""

    # 展开容器
    for _ in range(3):
        sb.execute_script(EXPAND_POPUP_JS)
        time.sleep(0.4)

    # 注入 token 监听器
    sb.execute_script("""
        window.__cf_turnstile_token__ = '';
        window.__cf_token_listener_injected__ = false;
    """)
    sb.execute_script(INJECT_TOKEN_LISTENER_JS)
    print(f"{label}📡 Token监听器已注入")

    # 等待自动通过（turnstile 有时无需点击）
    print(f"{label}⏳ 等待Turnstile自动完成...")
    for _ in range(8):
        time.sleep(0.8)
        if check_token(sb):
            print(f"{label}✅ Turnstile已自动通过")
            return True

    # 滚动到验证区域
    sb.execute_script("""
        var el = document.querySelector('input[name="cf-turnstile-response"]')
               || document.querySelector('.cf-turnstile');
        if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
    """)
    time.sleep(1.2)

    # 获取坐标并 xdotool 点击
    coords = get_turnstile_coords(sb)
    if not coords:
        print(f"{label}❌ 无法获取Turnstile坐标")
        sb.save_screenshot(f"turnstile_no_coords_{tag}.png")
        return False

    win_x, win_y, toolbar = get_window_offset(sb)
    abs_x = coords['click_x'] + win_x
    abs_y = coords['click_y'] + win_y + toolbar

    # 调试红点
    try:
        sb.execute_script(f"""
            (function(){{
                var dot = document.getElementById('__sniper_dot__') || document.createElement('div');
                dot.id = '__sniper_dot__';
                dot.style.cssText = 'position:fixed;left:{coords["click_x"]-5}px;top:{coords["click_y"]-5}px;'
                    + 'width:10px;height:10px;background:red;border-radius:50%;'
                    + 'z-index:99999999;pointer-events:none;box-shadow:0 0 6px red;';
                if (!document.getElementById('__sniper_dot__')) document.body.appendChild(dot);
            }})();
        """)
    except Exception:
        pass

    sb.save_screenshot(f"turnstile_click_{tag}.png")
    print(f"{label}📸 点击位置截图已保存")

    xdotool_click(abs_x, abs_y)

    # 等待 token
    for _ in range(30):
        time.sleep(0.6)
        if check_token(sb):
            print(f"{label}✅ Turnstile验证通过！")
            return True

    print(f"{label}❌ Turnstile验证超时")
    sb.save_screenshot(f"turnstile_fail_{tag}.png")
    return False


